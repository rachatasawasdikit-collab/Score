<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบยืม-คืนอุปกรณ์กายภาพบำบัด</title>
<style>
  :root {
    --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041; --green-50: #EAF3DE; --green-600: #3B6D11;
    --amber-50: #FAEEDA; --amber-600: #854F0B; --red-50: #FCEBEB; --red-600: #A32D2D;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-400: #888780; --gray-600: #5F5E5A; --gray-800: #444441;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: #f0f4f8; color: #1a2636; min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap');
  header { background: var(--blue-900); color: #fff; padding: 0; border-bottom: 3px solid var(--blue-600); }
  .header-inner { max-width: 1100px; margin: 0 auto; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .header-logo { width: 44px; height: 44px; background: var(--blue-600); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .header-logo svg { width: 26px; height: 26px; stroke: #fff; fill: none; stroke-width: 1.8; }
  .header-title h1 { font-size: 18px; font-weight: 600; }
  .header-title p { font-size: 13px; color: var(--blue-100); margin-top: 2px; }
  .sync-status { font-size: 12px; background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 8px; height: 8px; background: #52c41a; border-radius: 50%; display: inline-block; }
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 32px; }
  .tabs { display: flex; background: #fff; border: 1px solid var(--gray-100); border-radius: 10px; overflow: hidden; margin-bottom: 28px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .tab-btn { flex: 1; padding: 14px; border: none; background: transparent; font-size: 14px; font-weight: 500; color: var(--gray-600); cursor: pointer; border-right: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active { background: var(--blue-50); color: var(--blue-800); font-weight: 600; }
  .tab-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: #fff; border: 1px solid var(--gray-100); border-radius: 10px; padding: 18px 20px; }
  .stat-label { font-size: 12px; color: var(--gray-600); margin-bottom: 6px; font-weight: 500; }
  .stat-value { font-size: 28px; font-weight: 600; color: var(--blue-800); }
  .stat-sub { font-size: 12px; color: var(--gray-400); margin-top: 4px; }
  .card { background: #fff; border: 1px solid var(--gray-100); border-radius: 12px; padding: 24px; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--blue-900); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--gray-100); display: flex; align-items: center; gap: 8px; }
  .card-title svg { width: 18px; height: 18px; stroke: var(--blue-600); fill: none; stroke-width: 1.8; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-800); margin-bottom: 6px; }
  .form-label span.req { color: var(--red-600); }
  .form-control { width: 100%; padding: 9px 12px; border: 1px solid var(--gray-100); border-radius: 7px; font-family: inherit; font-size: 14px; background: #fff; transition: 0.2s; }
  .form-control:focus { outline: none; border-color: var(--blue-600); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
  .equip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 18px; }
  .equip-card { border: 2px solid var(--gray-100); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: 0.2s; background: #fff; }
  .equip-card:hover { border-color: var(--blue-600); background: var(--blue-50); }
  .equip-card.selected { border-color: var(--blue-600); background: var(--blue-50); }
  .equip-card.borrowed { border-color: var(--amber-600); background: var(--amber-50); opacity: 0.6; }
  .equip-name { font-size: 14px; font-weight: 600; color: var(--blue-900); margin-bottom: 4px; }
  .equip-id { font-size: 11px; color: var(--gray-400); margin-bottom: 8px; }
  .equip-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .equip-status.available { background: var(--green-50); color: var(--green-600); }
  .equip-status.borrowed { background: var(--amber-50); color: var(--amber-600); }
  .equip-status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .btn { padding: 10px 24px; border: none; border-radius: 7px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--blue-800); color: #fff; }
  .btn-success { background: var(--teal-600); color: #fff; }
  .btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--gray-50); }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; border-bottom: 1px solid var(--gray-100); }
  td { padding: 11px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-borrowed { background: var(--amber-50); color: var(--amber-600); }
  .badge-returned { background: var(--green-50); color: var(--green-600); }
  .badge-overdue { background: var(--red-50); color: var(--red-600); }
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; }
  .alert svg { width: 18px; height: 18px; stroke: currentColor; fill: none; margin-top: 1px; }
  .alert-success { background: var(--green-50); color: var(--green-800); }
  .alert-error { background: var(--red-50); color: var(--red-600); }
  .selected-equip-info { background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: var(--blue-800); }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } .header-inner { flex-direction: column; align-items: flex-start; gap:12px; } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="header-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 12h8M12 8v8"/></svg>
      </div>
      <div class="header-title">
        <h1>ระบบยืม-คืนอุปกรณ์กายภาพบำบัด</h1>
        <p>แผนกกายภาพบำบัด — เชื่อมต่อ Google Sheets 100%</p>
      </div>
    </div>
    <div class="sync-status" id="syncLabel">
      <span class="sync-dot" style="background:#888"></span> โหลดข้อมูล...
    </div>
  </div>
</header>

<div class="main">
  <div class="grid-3">
    <div class="stat-card"><div class="stat-label">อุปกรณ์ทั้งหมด</div><div class="stat-value" id="statTotal">0</div></div>
    <div class="stat-card"><div class="stat-label">พร้อมให้ยืม</div><div class="stat-value" id="statAvail" style="color: var(--teal-600)">0</div></div>
    <div class="stat-card"><div class="stat-label">กำลังถูกยืม</div><div class="stat-value" id="statBorrowed" style="color: var(--amber-600)">0</div></div>
    <div class="stat-card"><div class="stat-label">รายการทำธุรกรรม</div><div class="stat-value" id="statToday" style="color: var(--blue-600)">0</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('borrow')"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg> ยืมอุปกรณ์</button>
    <button class="tab-btn" onclick="switchTab('return')"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7 7 7-7"/></svg> คืนอุปกรณ์</button>
    <button class="tab-btn" onclick="switchTab('history')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> ประวัติการยืม</button>
  </div>

  <div class="tab-panel active" id="tab-borrow">
    <div class="grid-2">
      <div class="card">
        <div class="card-title"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h8m-8 6h16"/></svg> เลือกอุปกรณ์ที่ต้องการยืม</div>
        <div class="equip-grid" id="equipGrid"></div>
      </div>
      <div class="card">
        <div class="card-title"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ข้อมูลผู้ยืม</div>
        <div id="selectedEquipInfo" class="selected-equip-info" style="display:none"></div>
        <div class="form-group"><label class="form-label">ชื่อ-นามสกุลผู้ยืม <span class="req">*</span></label><input type="text" class="form-control" id="borrowerName" placeholder="เช่น นายสมชาย ใจดี" /></div>
        <div class="form-group"><label class="form-label">แผนก / หน่วยงาน <span class="req">*</span></label><input type="text" class="form-control" id="department" placeholder="เช่น หอผู้ป่วยใน 3" /></div>
        <div class="form-group"><label class="form-label">เบอร์โทรศัพท์ <span class="req">*</span></label><input type="text" class="form-control" id="phone" placeholder="เช่น 0812345678" /></div>
        <div class="form-group"><label class="form-label">วันที่กำหนดคืน <span class="req">*</span></label><input type="date" class="form-control" id="dueDate" /></div>
        <div class="form-group"><label class="form-label">หมายเหตุ</label><textarea class="form-control" id="borrowNote" rows="2" placeholder="ข้อมูลเพิ่มเติม (ถ้ามี)"></textarea></div>
        <div id="borrowFormMsg"></div>
        <button class="btn btn-primary" onclick="submitBorrow()" id="borrowBtn" style="width:100%; justify-content:center; margin-top:4px"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg> ยืนยันการยืม</button>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-return">
    <div class="card">
      <div class="card-title"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7 7 7-7"/></svg> รายการอุปกรณ์ที่ค้างคืน</div>
      <div id="returnList"></div>
      <div id="returnMsg" style="margin-top:16px;"></div>
      <button class="btn btn-success" onclick="submitReturn()" id="returnBtn" style="margin-top:16px"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg> ยืนยันการคืนที่เลือก</button>
    </div>
  </div>

  <div class="tab-panel" id="tab-history">
    <div class="card">
      <div class="card-title"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> ประวัติการทำรายการ</div>
      <div style="display:flex; gap:12px; margin-bottom:16px;">
        <input type="text" class="form-control" id="searchHistory" style="max-width:260px" placeholder="ค้นหาชื่อผู้ยืม, อุปกรณ์" oninput="renderHistory()" />
        <select class="form-control" id="filterStatus" style="max-width:160px" onchange="renderHistory()"><option value="">ทุกสถานะ</option><option value="BORROW">กำลังยืม</option><option value="RETURN">คืนแล้ว</option></select>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>รหัสรายการ</th><th>วันที่ยืม</th><th>อุปกรณ์</th><th>ผู้ยืม</th><th>แผนก</th><th>กำหนดคืน</th><th>สถานะ</th></tr></thead>
          <tbody id="historyTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
// ==========================================
// ส่วนตั้งค่าระบบหลัก
// ==========================================
const API_URL = 'https://script.google.com/macros/s/AKfycbw8QN2P_0I8wN7i-aNW3Debpf8Ed134Go7ZFqCq_FDxnq2LKcgx5w2lrnKm-G1iy95LPQ/exec';

// 📋 รายการอุปกรณ์ตั้งต้น (เพิ่ม-ลด ได้ที่นี่เลยครับ)
const equipments = [
  { id: 'PT-001', name: 'เครื่อง TENS (กระตุ้นไฟฟ้า)' },
  { id: 'PT-002', name: 'เครื่อง Ultrasound Therapy' },
  { id: 'PT-003', name: 'เครื่อง Infrared Lamp' },
  { id: 'PT-004', name: 'ไม้เท้า 4 ขา (Quad Cane)' },
  { id: 'PT-005', name: 'Walker มาตรฐาน' },
  { id: 'PT-006', name: 'ไม้ค้ำยัน (Axillary Crutch)' },
  { id: 'PT-007', name: 'Theraband (ยางยืด)' },
  { id: 'PT-008', name: 'ลูกบอลกายภาพ (Exercise Ball)' },
  { id: 'PT-009', name: 'เครื่องวัดองศาข้อต่อ (Goniometer)' },
  { id: 'PT-010', name: 'เครื่อง Hot / Cold Pack' }
];

equipments.forEach(eq => eq.status = 'available');
let transactions = [];
let selectedEquipId = null;

// ==========================================
// ฟังก์ชันสลับหน้าต่าง (Tabs)
// ==========================================
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const ids = ['borrow','return','history'];
    btn.classList.toggle('active', ids[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'return') renderReturnList();
}

// ==========================================
// 🔄 ฟังก์ชันดึงข้อมูลจาก Google Sheets (GET)
// ==========================================
async function pullDataFromSheet() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('API Error');
    const data = await res.json();
    
    transactions = data;
    equipments.forEach(eq => eq.status = 'available'); // รีเซ็ตเป็นว่าง

    // อัปเดตสถานะว่าชิ้นไหนถูกยืมไปแล้วบ้าง
    transactions.forEach(t => {
      if (t.action === 'BORROW' && !t.returnedAt) {
        const eq = equipments.find(e => e.id === t.equipId);
        if (eq) eq.status = 'borrowed';
      }
    });

    document.getElementById('syncLabel').innerHTML = '<span class="sync-dot" style="background:#52c41a"></span> เชื่อมต่อฐานข้อมูลแล้ว';
    updateUI();

  } catch (err) {
    console.error(err);
    document.getElementById('syncLabel').innerHTML = '<span class="sync-dot" style="background:#faad14"></span> กำลังพยายามเชื่อมต่อ...';
  }
}

// ==========================================
// 🚀 ฟังก์ชันส่งข้อมูลเข้า Google Sheets (POST)
// ==========================================
async function sendDataToSheet(payload) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      mode: 'no-cors', // ใช้ no-cors ป้องกันปัญหาจุกจิกของ Google Apps Script
      headers: { 'Content-Type': 'application/json' }
    });
    return true;
  } catch (err) {
    return false;
  }
}

// ==========================================
// ฟังก์ชันบันทึกการ "ยืม"
// ==========================================
async function submitBorrow() {
  showMsg('borrowFormMsg','','');
  const borrowerName = document.getElementById('borrowerName').value.trim();
  const department = document.getElementById('department').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const dueDate = document.getElementById('dueDate').value;
  const note = document.getElementById('borrowNote').value.trim();

  if (!selectedEquipId) return showMsg('borrowFormMsg','error','กรุณาเลือกอุปกรณ์');
  if (!borrowerName || !department || !phone || !dueDate) return showMsg('borrowFormMsg','error','กรุณากรอกข้อมูลให้ครบถ้วน');

  const eq = equipments.find(e => e.id === selectedEquipId);
  const btn = document.getElementById('borrowBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังบันทึกข้อมูล...';

  // สร้างไอดีการทำรายการสุ่ม
  const transId = 'TR-' + Date.now();
  const timestamp = new Date().toISOString();

  // สร้าง Payload ตามโครงสร้างหลังบ้าน
  const payload = {
    action: 'WEB_BORROW',
    transId: transId,
    timestamp: timestamp,
    equipId: eq.id,
    equipName: eq.name,
    borrowerName: borrowerName,
    department: department,
    phone: phone,
    dueDate: dueDate,
    note: note
  };

  // หลอก UI ให้ขึ้นสถานะถูกยืมไปก่อน (เพื่อความลื่นไหล)
  eq.status = 'borrowed';
  transactions.unshift({...payload, action: 'BORROW', returnedAt: ''});
  updateUI();

  // ส่งข้อมูลเข้า Sheet จริง
  await sendDataToSheet(payload);
  
  showMsg('borrowFormMsg','success', 'บันทึกการยืมเข้า Google Sheets สำเร็จ!');
  
  // ล้างค่าฟอร์ม
  document.getElementById('borrowerName').value = '';
  document.getElementById('department').value = '';
  document.getElementById('phone').value = '';
  document.getElementById('borrowNote').value = '';
  selectedEquipId = null;
  document.getElementById('selectedEquipInfo').style.display = 'none';

  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg> ยืนยันการยืม';
  
  setTimeout(pullDataFromSheet, 2000); // ดึงข้อมูลเช็คความชัวร์อีกรอบ
}

// ==========================================
// ฟังก์ชันบันทึกการ "คืน"
// ==========================================
async function submitReturn() {
  const checked = [...document.querySelectorAll('[id^="ret_"]:checked')].map(c => c.value);
  if (checked.length === 0) return showMsg('returnMsg','error','กรุณาเลือกรายการที่ต้องการคืน');
  
  const btn = document.getElementById('returnBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> กำลังบันทึก...';
  showMsg('returnMsg','','');

  const now = new Date().toISOString();

  for (const transId of checked) {
    const t = transactions.find(x => x.transId === transId);
    if(t) {
      t.returnedAt = now; 
      const eq = equipments.find(e => e.id === t.equipId);
      if(eq) eq.status = 'available';
    }
    const payload = { action: 'WEB_RETURN', targetTransId: transId, timestamp: now };
    await sendDataToSheet(payload);
  }

  updateUI();
  showMsg('returnMsg','success', `บันทึกการคืนอุปกรณ์สำเร็จ`);
  
  btn.disabled = false;
  btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg> ยืนยันการคืนที่เลือก';
  setTimeout(pullDataFromSheet, 2000);
}

// ==========================================
// ส่วนแสดงผล UI ต่างๆ
// ==========================================
function updateUI() {
  const total = equipments.length;
  const avail = equipments.filter(e => e.status === 'available').length;
  const borrowed = total - avail;
  
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statAvail').textContent = avail;
  document.getElementById('statBorrowed').textContent = borrowed;
  document.getElementById('statToday').textContent = transactions.length;

  renderEquipGrid();
  renderReturnList();
  renderHistory();
}

function renderEquipGrid() {
  const grid = document.getElementById('equipGrid');
  grid.innerHTML = equipments.map(e => {
    const isSel = e.id === selectedEquipId ? ' selected' : '';
    const isBor = e.status === 'borrowed';
    return `
      <div class="equip-card${isSel}${isBor ? ' borrowed' : ''}" onclick="${isBor ? '' : `selectEquip('${e.id}')`}">
        <div class="equip-name">${e.name}</div>
        <div class="equip-id">${e.id}</div>
        ${isBor ? '<span class="equip-status borrowed"><span class="equip-status-dot"></span>ถูกยืมอยู่</span>' 
                : '<span class="equip-status available"><span class="equip-status-dot"></span>พร้อมให้ยืม</span>'}
      </div>
    `;
  }).join('');
}

function selectEquip(id) {
  selectedEquipId = id;
  const eq = equipments.find(e => e.id === id);
  const info = document.getElementById('selectedEquipInfo');
  info.style.display = 'block';
  info.innerHTML = '<strong>เลือกอุปกรณ์:</strong> ' + eq.name + ' (' + eq.id + ')';
  renderEquipGrid();
}

function renderReturnList() {
  const borrowed = transactions.filter(t => t.action === 'BORROW' && !t.returnedAt);
  const el = document.getElementById('returnList');
  if (borrowed.length === 0) {
    el.innerHTML = '<div style="color:var(--gray-400);padding:12px 0">ขณะนี้ไม่มีอุปกรณ์ค้างคืนในระบบ</div>';
    return;
  }
  el.innerHTML = `<div style="overflow-x:auto"><table><thead><tr><th>เลือก</th><th>รหัส</th><th>วันที่ยืม</th><th>อุปกรณ์</th><th>ผู้ยืม</th><th>กำหนดคืน</th></tr></thead><tbody>` + 
  borrowed.map(t => `
    <tr>
      <td><input type="checkbox" id="ret_${t.transId}" value="${t.transId}" style="width:16px;height:16px;cursor:pointer;"></td>
      <td style="font-size:11px;color:#888">${t.transId.substring(0,8)}..</td>
      <td>${new Date(t.timestamp).toLocaleDateString('th-TH')}</td>
      <td>${t.equipName}</td>
      <td>${t.borrowerName}</td>
      <td><span class="badge badge-borrowed">${t.dueDate}</span></td>
    </tr>
  `).join('') + `</tbody></table></div>`;
}

function renderHistory() {
  const search = document.getElementById('searchHistory').value.toLowerCase();
  const filter = document.getElementById('filterStatus').value;
  let list = [...transactions];
  
  if (search) list = list.filter(t => t.borrowerName.toLowerCase().includes(search) || t.equipName.toLowerCase().includes(search));
  if (filter) list = list.filter(t => filter === 'BORROW' ? !t.returnedAt : t.returnedAt);

  const tbody = document.getElementById('historyTbody');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888;padding:20px;">ไม่พบรายการ</td></tr>';
    return;
  }
  
  tbody.innerHTML = list.map(t => {
    const isRet = !!t.returnedAt;
    const badge = isRet ? 'badge-returned">คืนแล้ว' : 'badge-borrowed">กำลังยืม';
    return `<tr>
      <td style="font-size:11px;color:#888">${t.transId.substring(0,8)}..</td>
      <td>${new Date(t.timestamp).toLocaleDateString('th-TH')}</td>
      <td>${t.equipName}</td>
      <td>${t.borrowerName}</td>
      <td>${t.department}</td>
      <td>${t.dueDate}</td>
      <td><span class="badge ${badge}</span></td>
    </tr>`;
  }).join('');
}

function showMsg(elId, type, msg) {
  const el = document.getElementById(elId);
  if (!msg) { el.innerHTML = ''; return; }
  const icon = type === 'success' ? '<path d="M5 12l5 5L20 7"/>' : '<path d="M12 8v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>';
  el.innerHTML = `<div class="alert alert-${type}"><svg viewBox="0 0 24 24">${icon}</svg><span>${msg}</span></div>`;
}

// ตั้งวันที่เริ่มต้นอัตโนมัติ
const d = new Date(); d.setDate(d.getDate() + 3);
document.getElementById('dueDate').value = d.toISOString().split('T')[0];

// เริ่มทำงานเมื่อเปิดเว็บ
updateUI();
pullDataFromSheet();
setInterval(pullDataFromSheet, 3000); // อัปเดตตารางและสถานะอัตโนมัติ ทุกๆ 3 วินาที
</script>
